<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HabitTrack — Store Tests</title>
  <style>
    body { font-family: monospace; margin: 2rem; background: #1a1a2e; color: #e0e0e0; }
    h1 { color: #fff; margin-bottom: 1rem; }
    #output { white-space: pre-wrap; line-height: 1.6; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; font-weight: bold; }
    .section { color: #64b5f6; font-weight: bold; margin-top: 0.5em; }
    .summary { margin-top: 1rem; padding: 1rem; border-radius: 8px; font-size: 1.2em; }
    .summary-pass { background: #1b5e20; color: #a5d6a7; }
    .summary-fail { background: #b71c1c; color: #ef9a9a; }
  </style>
</head>
<body>
<h1>HabitTrack Store Tests</h1>
<div id="output"></div>
<script type="module">
import {
  loadData, saveData, addHabit, updateHabit, deleteHabit,
  getHabitsByZone, moveHabit, toggleCheckIn,
  getCurrentStreak, getDaysSince,
  addReflection, updateReflection, getReflections, getReflectionForCurrentWeek,
  exportData, importData, resetData, getStats,
  todayISO, getMonday
} from './js/store.js';

const out = document.getElementById('output');
let passed = 0;
let failed = 0;

function assert(condition, msg) {
  if (condition) {
    passed++;
    out.innerHTML += `<span class="pass">PASS</span>: ${msg}\n`;
  } else {
    failed++;
    out.innerHTML += `<span class="fail">FAIL</span>: ${msg}\n`;
  }
}

function section(name) {
  out.innerHTML += `\n<span class="section">--- ${name} ---</span>\n`;
}

// ========================================
// Clean slate
// ========================================
resetData();

// ========================================
// Helpers
// ========================================
section('Helpers: todayISO, getMonday');

const today = todayISO();
assert(/^\d{4}-\d{2}-\d{2}$/.test(today), 'todayISO returns YYYY-MM-DD format');
assert(today === new Date().toISOString().split('T')[0], 'todayISO matches current date');

// getMonday: 2026-03-22 is a Sunday => Monday should be 2026-03-16
assert(getMonday('2026-03-22') === '2026-03-16', 'getMonday for Sunday 2026-03-22 returns 2026-03-16');
// 2026-03-16 is a Monday => should return itself
assert(getMonday('2026-03-16') === '2026-03-16', 'getMonday for Monday returns itself');
// 2026-03-18 is a Wednesday => Monday is 2026-03-16
assert(getMonday('2026-03-18') === '2026-03-16', 'getMonday for Wednesday 2026-03-18 returns 2026-03-16');
// 2026-03-21 is a Saturday => Monday is 2026-03-16
assert(getMonday('2026-03-21') === '2026-03-16', 'getMonday for Saturday 2026-03-21 returns 2026-03-16');

// ========================================
// Core read/write
// ========================================
section('Core: loadData, saveData');

resetData();
const defaultData = loadData();
assert(Array.isArray(defaultData.habits), 'loadData returns object with habits array');
assert(Array.isArray(defaultData.reflections), 'loadData returns object with reflections array');
assert(defaultData.settings.exportVersion === 1, 'loadData returns default settings');
assert(defaultData.habits.length === 0, 'default data has empty habits');

// saveData + loadData round-trip
const testData = { habits: [{ id: 'test' }], reflections: [], settings: { exportVersion: 1 } };
saveData(testData);
const loaded = loadData();
assert(loaded.habits.length === 1, 'saveData persists data that loadData reads back');
assert(loaded.habits[0].id === 'test', 'saveData preserves habit id');

// Corrupt data fallback
localStorage.setItem('habittrack_data', '{invalid json!!!');
const fallback = loadData();
assert(fallback.habits.length === 0, 'loadData returns default on parse error');
resetData();

// ========================================
// Habits CRUD
// ========================================
section('Habits CRUD: addHabit');

resetData();
const h1 = addHabit('Meditate', 'present', 'wellness');
assert(h1 !== null && h1 !== undefined, 'addHabit returns habit object');
assert(typeof h1.id === 'string' && h1.id.length > 0, 'addHabit generates an id');
assert(h1.title === 'Meditate', 'addHabit sets title');
assert(h1.zone === 'present', 'addHabit sets zone');
assert(h1.category === 'wellness', 'addHabit sets category');
assert(h1.createdAt === todayISO(), 'addHabit sets createdAt to today');
assert(h1.movedAt === todayISO(), 'addHabit sets movedAt to today');
assert(h1.targetDate === null, 'addHabit defaults targetDate to null');
assert(Array.isArray(h1.checkIns) && h1.checkIns.length === 0, 'addHabit initializes empty checkIns');
assert(h1.notes === '', 'addHabit initializes empty notes');

const h2 = addHabit('Run 5K', 'future', 'fitness', '2026-06-01');
assert(h2.targetDate === '2026-06-01', 'addHabit sets targetDate when provided');
assert(h2.id !== h1.id, 'addHabit generates unique ids');

// Default category
const h3 = addHabit('Read', 'present');
assert(h3.category === '', 'addHabit defaults category to empty string');

section('Habits CRUD: getHabitsByZone');

assert(getHabitsByZone('present').length === 2, 'getHabitsByZone("present") returns 2 habits');
assert(getHabitsByZone('future').length === 1, 'getHabitsByZone("future") returns 1 habit');
assert(getHabitsByZone('past').length === 0, 'getHabitsByZone("past") returns 0 habits');

section('Habits CRUD: updateHabit');

const updated = updateHabit(h1.id, { title: 'Meditate 15 min', notes: 'morning routine' });
assert(updated !== null, 'updateHabit returns updated habit');
assert(updated.title === 'Meditate 15 min', 'updateHabit updates title');
assert(updated.notes === 'morning routine', 'updateHabit updates notes');
assert(updated.zone === 'present', 'updateHabit preserves unchanged fields');

const notFound = updateHabit('nonexistent-id', { title: 'X' });
assert(notFound === null, 'updateHabit returns null for nonexistent id');

section('Habits CRUD: toggleCheckIn');

const toggled = toggleCheckIn(h1.id, '2026-03-20');
assert(toggled !== null, 'toggleCheckIn returns habit');
assert(toggled.checkIns.includes('2026-03-20'), 'toggleCheckIn adds date to checkIns');

// Persist check
const fromStore = getHabitsByZone('present').find(h => h.id === h1.id);
assert(fromStore.checkIns.includes('2026-03-20'), 'toggleCheckIn persists to store');

// Toggle off
const toggled2 = toggleCheckIn(h1.id, '2026-03-20');
assert(!toggled2.checkIns.includes('2026-03-20'), 'toggleCheckIn removes date on second call');

// Nonexistent habit
const toggleNull = toggleCheckIn('nonexistent-id', '2026-03-20');
assert(toggleNull === null, 'toggleCheckIn returns null for nonexistent id');

// Default date is today
toggleCheckIn(h1.id);
const afterDefault = getHabitsByZone('present').find(h => h.id === h1.id);
assert(afterDefault.checkIns.includes(todayISO()), 'toggleCheckIn defaults to todayISO');
toggleCheckIn(h1.id); // clean up

section('Habits CRUD: moveHabit');

const moved = moveHabit(h1.id, 'past');
assert(moved !== null, 'moveHabit returns habit');
assert(moved.zone === 'past', 'moveHabit changes zone');
assert(moved.movedAt === todayISO(), 'moveHabit updates movedAt');
assert(getHabitsByZone('past').length === 1, 'moveHabit: habit appears in new zone');
assert(getHabitsByZone('present').length === 1, 'moveHabit: habit removed from old zone');

section('Habits CRUD: deleteHabit');

deleteHabit(h1.id);
assert(getHabitsByZone('past').length === 0, 'deleteHabit removes habit from store');
assert(loadData().habits.length === 2, 'deleteHabit: total habits count decreased');

deleteHabit(h2.id);
deleteHabit(h3.id);
assert(loadData().habits.length === 0, 'deleteHabit: all habits removed');

// ========================================
// Streak calculation
// ========================================
section('Streak: getCurrentStreak');

// Build a habit with known check-ins
resetData();
const streakHabit = addHabit('Streak test', 'present');

// No check-ins => streak 0
assert(getCurrentStreak(streakHabit) === 0, 'getCurrentStreak returns 0 for no check-ins');

// Add today => streak 1
toggleCheckIn(streakHabit.id, todayISO());
let sh = getHabitsByZone('present')[0];
assert(getCurrentStreak(sh) === 1, 'getCurrentStreak returns 1 for today only');

// Add yesterday => streak 2
const yesterday = new Date();
yesterday.setDate(yesterday.getDate() - 1);
const yesterdayISO = yesterday.toISOString().split('T')[0];
toggleCheckIn(streakHabit.id, yesterdayISO);
sh = getHabitsByZone('present')[0];
assert(getCurrentStreak(sh) === 2, 'getCurrentStreak returns 2 for today + yesterday');

// Add day before yesterday => streak 3
const dayBefore = new Date();
dayBefore.setDate(dayBefore.getDate() - 2);
const dayBeforeISO = dayBefore.toISOString().split('T')[0];
toggleCheckIn(streakHabit.id, dayBeforeISO);
sh = getHabitsByZone('present')[0];
assert(getCurrentStreak(sh) === 3, 'getCurrentStreak returns 3 for 3 consecutive days');

// Streak starting from yesterday (no today) should still count
toggleCheckIn(streakHabit.id, todayISO()); // remove today
sh = getHabitsByZone('present')[0];
assert(getCurrentStreak(sh) === 2, 'getCurrentStreak counts streak starting from yesterday');

// Gap: remove yesterday, keep day before => streak 0 (gap at yesterday)
toggleCheckIn(streakHabit.id, yesterdayISO); // remove yesterday
sh = getHabitsByZone('present')[0];
assert(getCurrentStreak(sh) === 0, 'getCurrentStreak returns 0 when most recent is 2 days ago');

section('Streak: getDaysSince');

resetData();
const daysHabit = addHabit('Days test', 'past');
assert(getDaysSince(daysHabit) === 0, 'getDaysSince returns 0 for habit moved today');

// Simulate a habit moved 5 days ago
const fiveDaysAgo = new Date();
fiveDaysAgo.setDate(fiveDaysAgo.getDate() - 5);
const fiveDaysAgoISO = fiveDaysAgo.toISOString().split('T')[0];
updateHabit(daysHabit.id, { movedAt: fiveDaysAgoISO });
const updatedDH = loadData().habits.find(h => h.id === daysHabit.id);
assert(getDaysSince(updatedDH) === 5, 'getDaysSince returns 5 for habit moved 5 days ago');

// ========================================
// Reflections CRUD
// ========================================
section('Reflections: addReflection');

resetData();
const r1 = addReflection('Good progress', 'Time management', 'Plan better');
assert(r1 !== null && r1 !== undefined, 'addReflection returns reflection object');
assert(typeof r1.id === 'string' && r1.id.length > 0, 'addReflection generates an id');
assert(r1.whatWorked === 'Good progress', 'addReflection sets whatWorked');
assert(r1.whatBlocked === 'Time management', 'addReflection sets whatBlocked');
assert(r1.nextSteps === 'Plan better', 'addReflection sets nextSteps');
assert(r1.weekOf === getMonday(todayISO()), 'addReflection sets weekOf to current Monday');
assert(r1.createdAt === todayISO(), 'addReflection sets createdAt to today');

section('Reflections: getReflections');

const reflections = getReflections();
assert(Array.isArray(reflections), 'getReflections returns array');
assert(reflections.length === 1, 'getReflections returns correct count');
assert(reflections[0].id === r1.id, 'getReflections includes added reflection');

// Add another reflection (different week for sorting test)
const data = loadData();
data.reflections.push({
  id: crypto.randomUUID(),
  weekOf: '2026-03-09',
  whatWorked: 'Old week',
  whatBlocked: '',
  nextSteps: '',
  createdAt: '2026-03-15'
});
saveData(data);

const sorted = getReflections();
assert(sorted.length === 2, 'getReflections returns all reflections');
assert(sorted[0].weekOf >= sorted[1].weekOf, 'getReflections sorted newest first');

section('Reflections: updateReflection');

const updatedR = updateReflection(r1.id, { whatWorked: 'Great progress!' });
assert(updatedR !== null, 'updateReflection returns updated reflection');
assert(updatedR.whatWorked === 'Great progress!', 'updateReflection updates field');
assert(updatedR.whatBlocked === 'Time management', 'updateReflection preserves other fields');

const notFoundR = updateReflection('nonexistent', { whatWorked: 'X' });
assert(notFoundR === null, 'updateReflection returns null for nonexistent id');

section('Reflections: getReflectionForCurrentWeek');

const currentWeek = getReflectionForCurrentWeek();
assert(currentWeek !== null, 'getReflectionForCurrentWeek finds current week reflection');
assert(currentWeek.id === r1.id, 'getReflectionForCurrentWeek returns correct reflection');

// Remove current week reflection and check null return
resetData();
assert(getReflectionForCurrentWeek() === null, 'getReflectionForCurrentWeek returns null when no reflection exists');

// ========================================
// Import / Export
// ========================================
section('Import/Export: exportData, importData');

resetData();
addHabit('Export test', 'present', 'test');
addReflection('Works', 'Blocks', 'Next');

const exported = exportData();
assert(typeof exported === 'string', 'exportData returns a string');
const parsed = JSON.parse(exported);
assert(parsed.habits.length === 1, 'exportData JSON contains habits');
assert(parsed.reflections.length === 1, 'exportData JSON contains reflections');
assert(parsed.settings.exportVersion === 1, 'exportData JSON contains settings');

// Reset and import
resetData();
assert(loadData().habits.length === 0, 'resetData cleared habits');
assert(loadData().reflections.length === 0, 'resetData cleared reflections');

importData(exported);
assert(loadData().habits.length === 1, 'importData restores habits');
assert(loadData().reflections.length === 1, 'importData restores reflections');
assert(loadData().habits[0].title === 'Export test', 'importData preserves habit data');

// Import invalid JSON
let importError = false;
try {
  importData('not valid json');
} catch (e) {
  importError = true;
}
assert(importError, 'importData throws on invalid JSON');

// Import invalid structure
let structError = false;
try {
  importData('{"habits": "not an array", "reflections": []}');
} catch (e) {
  structError = true;
}
assert(structError, 'importData throws on invalid data structure (habits not array)');

let structError2 = false;
try {
  importData('{"habits": [], "reflections": "not an array"}');
} catch (e) {
  structError2 = true;
}
assert(structError2, 'importData throws on invalid data structure (reflections not array)');

// ========================================
// resetData
// ========================================
section('resetData');

addHabit('To be wiped', 'present');
resetData();
const afterReset = loadData();
assert(afterReset.habits.length === 0, 'resetData clears all habits');
assert(afterReset.reflections.length === 0, 'resetData clears all reflections');
assert(afterReset.settings.exportVersion === 1, 'resetData preserves default settings');

// ========================================
// Stats
// ========================================
section('Stats: getStats');

resetData();
const active1 = addHabit('Active 1', 'present', 'cat');
const active2 = addHabit('Active 2', 'present', 'cat');
addHabit('Acquired 1', 'past', 'cat');
addHabit('Future 1', 'future', 'cat');
addHabit('Future 2', 'future', 'cat');

const stats = getStats();
assert(stats.activeCount === 2, 'getStats activeCount is 2');
assert(stats.acquiredCount === 1, 'getStats acquiredCount is 1');
assert(stats.futureCount === 2, 'getStats futureCount is 2');
assert(typeof stats.longestStreak === 'number', 'getStats longestStreak is a number');
assert(typeof stats.weeklyRate === 'number', 'getStats weeklyRate is a number');
assert(Array.isArray(stats.last30), 'getStats last30 is an array');
assert(stats.last30.length === 30, 'getStats last30 has 30 entries');
assert(stats.last30[0].date !== undefined, 'getStats last30 entries have date');
assert(typeof stats.last30[0].count === 'number', 'getStats last30 entries have count');

// Check last30 is sorted chronologically (oldest first)
assert(stats.last30[0].date < stats.last30[29].date, 'getStats last30 sorted oldest to newest');
assert(stats.last30[29].date === todayISO(), 'getStats last30 ends with today');

// Add a check-in for today and verify longestStreak
toggleCheckIn(active1.id, todayISO());
const stats2 = getStats();
assert(stats2.longestStreak >= 1, 'getStats longestStreak counts at least 1 after check-in');

// ========================================
// Summary
// ========================================
resetData(); // clean up

const summaryClass = failed === 0 ? 'summary-pass' : 'summary-fail';
out.innerHTML += `\n<div class="summary ${summaryClass}">${passed} passed, ${failed} failed</div>\n`;

if (failed > 0) {
  document.title = `FAIL (${failed}) — HabitTrack Tests`;
} else {
  document.title = `ALL PASS (${passed}) — HabitTrack Tests`;
}
</script>
</body>
</html>
